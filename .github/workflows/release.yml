name: Release

on:
  push:
    branches:
      - main
permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    with:
      node-versions: '["24"]'

  release:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Release
        uses: changesets/action@v1
        with:
          publish: pnpm release
